server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container (same-origin from the browser → no CORS).
    # The trailing slash on proxy_pass strips the /api prefix, matching the Vite dev proxy.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # SPA fallback so React Router deep links work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
